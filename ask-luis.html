<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask El Capitan — The Grateful Team</title>
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Josefin+Slab:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a0e2b;
      --bg-header: #2d1060;
      --bg-messages: #1a0e2b;
      --bg-input-bar: #0f0820;
      --bubble-luis-bg: rgba(255,255,255,0.11);
      --bubble-luis-border: rgba(255,255,255,0.1);
      --bubble-luis-text: #ede8ff;
      --bubble-user-bg: #f9f108;
      --bubble-user-text: #1a0e2b;
      --gold: #f9f108;
      --cream: #f0eaff;
      --muted: rgba(240,234,255,0.5);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* ── Layout: full-screen flex column ── */
    .chat-shell {
      display: flex; flex-direction: column;
      height: 100dvh; /* dynamic viewport height — handles mobile address bar */
      max-width: 640px; margin: 0 auto;
    }

    /* ── Header ── */
    .chat-header {
      background: var(--bg-header);
      border-bottom: 1px solid rgba(249,241,8,0.18);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      flex-shrink: 0;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 7px 14px 7px 10px;
      color: var(--cream); font-family: 'Josefin Slab', serif;
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; text-decoration: none;
      transition: background 150ms; flex-shrink: 0;
    }
    .back-btn:hover { background: rgba(255,255,255,0.18); }
    .back-btn svg { flex-shrink: 0; }

    .chat-header-identity {
      display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0;
    }
    .chat-header-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; border: 2px solid var(--gold); flex-shrink: 0;
    }
    .chat-header-name {
      font-family: 'Abril Fatface', serif; font-size: 17px;
      color: var(--gold); line-height: 1; white-space: nowrap;
    }
    .chat-header-sub {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Messages ── */
    #chat-messages {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      background: var(--bg-messages);
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 82%; font-size: 15px; line-height: 1.6;
      padding: 12px 16px; border-radius: 18px;
      word-break: break-word; white-space: pre-wrap;
    }
    .msg-luis {
      background: var(--bubble-luis-bg);
      border: 1px solid var(--bubble-luis-border);
      color: var(--bubble-luis-text);
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
    }
    .msg-user {
      background: var(--bubble-user-bg);
      color: var(--bubble-user-text);
      font-weight: 600;
      border-radius: 18px 18px 4px 18px;
      align-self: flex-end;
    }
    .msg-typing {
      font-size: 22px; letter-spacing: 5px;
      padding: 10px 16px;
      color: var(--muted);
      align-self: flex-start;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }

    /* ── Input bar ── */
    .chat-input-bar {
      background: var(--bg-input-bar);
      border-top: 1px solid rgba(249,241,8,0.14);
      padding: 12px 16px;
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
      /* Push above OS gesture bar on iPhone */
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(249,241,8,0.22);
      border-radius: 12px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; /* MUST be 16px — prevents iOS auto-zoom */
      line-height: 1.45;
      padding: 11px 14px;
      outline: none; resize: none;
      min-height: 46px; max-height: 120px;
      overflow-y: auto;
      transition: border-color 150ms;
      -webkit-appearance: none;
    }
    #chat-input::placeholder { color: rgba(240,234,255,0.38); }
    #chat-input:focus { border-color: rgba(249,241,8,0.55); }

    #chat-send {
      background: var(--gold); color: #1a0e2b;
      border: none; border-radius: 12px;
      width: 46px; height: 46px; flex-shrink: 0;
      font-size: 20px; font-weight: 700;
      cursor: pointer; transition: filter 150ms, opacity 150ms;
      display: flex; align-items: center; justify-content: center;
    }
    #chat-send:hover { filter: brightness(1.1); }
    #chat-send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Scroll-to-bottom fab ── */
    #scroll-fab {
      position: absolute; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      background: var(--bg-header); color: var(--cream);
      border: 1px solid rgba(249,241,8,0.2);
      border-radius: 20px; padding: 6px 14px;
      font-size: 12px; font-family: 'Josefin Slab', serif;
      font-weight: 700; letter-spacing: 0.07em;
      cursor: pointer; display: none; z-index: 10;
    }
  </style>
</head>

<body>
<div class="chat-shell">

  <!-- Header with back button -->
  <header class="chat-header">
    <a href="/" class="back-btn" aria-label="Back to The Grateful Team">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 2 4 7 9 12"></polyline>
      </svg>
      Back
    </a>
    <div class="chat-header-identity">
      <img class="chat-header-avatar"
        src="https://donordrivecontent.com/wishamile/images/$avatars$/constituent_939DF099-9E15-71BA-827B5EF85610BE47.jpg"
        alt="Luis Vecchio"
        onerror="this.style.display='none'">
      <div>
        <div class="chat-header-name">El Capitan</div>
        <div class="chat-header-sub">Luis Vecchio · TGT · WAM Veteran</div>
      </div>
    </div>
  </header>

  <!-- Messages -->
  <div id="chat-messages">
    <div class="msg msg-luis">Ahoy. I'm Luis — El Capitan. Real boat captain, real WAM rider, real TGT legend. Ask me anything about the ride, the team, fundraising, or why you should join us.</div>
  </div>

  <!-- Input bar -->
  <div class="chat-input-bar">
    <textarea
      id="chat-input"
      placeholder="Ask Luis anything…"
      rows="1"
      maxlength="500"
      autocomplete="off"
      autocorrect="on"
      spellcheck="true"
    ></textarea>
    <button id="chat-send" aria-label="Send">↑</button>
  </div>

</div>

<script>
(function() {
  const WORKER_URL = 'https://ask-luis.jmaitner1.workers.dev';
  const msgs  = document.getElementById('chat-messages');
  const input = document.getElementById('chat-input');
  const send  = document.getElementById('chat-send');

  // Auto-grow textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  function addMsg(text, who) {
    const el = document.createElement('div');
    el.className = 'msg msg-' + who;
    el.textContent = text;
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg msg-typing';
    el.textContent = '• • •';
    msgs.appendChild(el);
    msgs.scrollTop = msgs.scrollHeight;
    return el;
  }

  async function askLuis(message) {
    send.disabled = true;
    const typing = showTyping();
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      typing.remove();
      if (!res.ok) throw new Error();
      const data = await res.json();
      addMsg(data.reply || "Something went sideways. Try again.", 'luis');
    } catch {
      typing.remove();
      addMsg("Lost the signal — try again in a sec, captain's orders.", 'luis');
    } finally {
      send.disabled = false;
      input.focus();
      msgs.scrollTop = msgs.scrollHeight;
    }
  }

  function submit() {
    const msg = input.value.trim();
    if (!msg || send.disabled) return;
    input.value = '';
    input.style.height = 'auto';
    addMsg(msg, 'user');
    askLuis(msg);
  }

  send.addEventListener('click', submit);
  input.addEventListener('keydown', e => {
    // On mobile, Enter sends a newline (that's fine). On desktop, Enter submits.
    if (e.key === 'Enter' && !e.shiftKey && !('ontouchstart' in window)) {
      e.preventDefault();
      submit();
    }
  });
})();
</script>
</body>
</html>
