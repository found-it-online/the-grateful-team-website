<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask El Capitan — The Grateful Team</title>
  <meta name="description" content="Ask Luis Vecchio — El Capitan of The Grateful Team — anything about the WAM ride, fundraising, and the team.">
  <meta name="robots" content="noindex">

  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link rel="apple-touch-icon" href="/assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Josefin+Slab:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:    #0f0820;
      --bg-header:  #2d1060;
      --bg-chat:    #1a0e2b;
      --bg-input:   #0f0820;
      --gold:       #f9f108;
      --cream:      #f0eaff;
      --muted:      rgba(240,234,255,0.5);
      --luis-bg:    rgba(255,255,255,0.11);
      --luis-border:rgba(255,255,255,0.1);
      --luis-text:  #ede8ff;
      --user-bg:    #f9f108;
      --user-text:  #1a0e2b;
    }

    html { height: 100%; }
    body {
      min-height: 100%;
      background: var(--bg-page);
      font-family: 'DM Sans', sans-serif;
      /* Desktop: show a nice background behind the chat panel */
      background-image: radial-gradient(ellipse at 30% 20%, rgba(90,30,138,0.35) 0%, transparent 60%),
                        radial-gradient(ellipse at 80% 80%, rgba(4,178,202,0.1) 0%, transparent 50%);
    }

    /* ── Outer wrapper — centers the panel on desktop ── */
    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 0;
    }

    /* ── The chat panel ── */
    .chat-panel {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      background: var(--bg-chat);
      /* Desktop: floating card look */
    }

    @media (min-width: 700px) {
      .page-wrap { padding: 32px 16px 32px; justify-content: center; min-height: 100vh; }
      .chat-panel {
        height: min(780px, calc(100vh - 64px));
        border-radius: 20px;
        border: 1px solid rgba(249,241,8,0.18);
        box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(90,30,138,0.3);
        overflow: hidden;
      }
    }

    /* ── Header ── */
    .chat-header {
      background: var(--bg-header);
      border-bottom: 1px solid rgba(249,241,8,0.18);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 7px 14px 7px 10px;
      color: var(--cream);
      font-family: 'Josefin Slab', serif; font-size: 12px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      text-decoration: none; transition: background 150ms; flex-shrink: 0;
      white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.2); }

    .chat-header-identity {
      display: flex; align-items: center; gap: 12px;
      flex: 1; min-width: 0;
    }
    .luis-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      object-fit: cover; border: 2.5px solid var(--gold);
      flex-shrink: 0;
    }
    .luis-name {
      font-family: 'Abril Fatface', serif;
      font-size: 18px; color: var(--gold); line-height: 1;
    }
    .luis-sub {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-top: 4px;
    }

    /* ── Messages area ── */
    #messages {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      padding: 24px 20px;
      display: flex; flex-direction: column;
      gap: 14px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 78%;
      font-size: 15px; line-height: 1.6;
      padding: 13px 17px; border-radius: 18px;
      word-break: break-word; white-space: pre-wrap;
    }
    .msg-luis {
      background: var(--luis-bg);
      border: 1px solid var(--luis-border);
      color: var(--luis-text);
      border-radius: 18px 18px 18px 4px;
      align-self: flex-start;
    }
    .msg-user {
      background: var(--user-bg);
      color: var(--user-text);
      font-weight: 600;
      border-radius: 18px 18px 4px 18px;
      align-self: flex-end;
    }
    .msg-typing {
      font-size: 22px; letter-spacing: 5px;
      padding: 10px 17px;
      color: var(--muted);
      align-self: flex-start;
      animation: blink 1.2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:.25} 50%{opacity:1} }

    /* ── Suggested starters (shown before first user message) ── */
    #starters {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 20px 16px;
    }
    .starter-chip {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(249,241,8,0.2);
      border-radius: 20px; padding: 8px 14px;
      color: var(--cream); font-size: 13px;
      cursor: pointer; transition: background 150ms, border-color 150ms;
      font-family: 'DM Sans', sans-serif;
    }
    .starter-chip:hover {
      background: rgba(249,241,8,0.12);
      border-color: rgba(249,241,8,0.45);
    }

    /* ── Input bar ── */
    .chat-input-bar {
      background: var(--bg-input);
      border-top: 1px solid rgba(249,241,8,0.14);
      padding: 14px 20px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      display: flex; gap: 10px; align-items: flex-end;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      background: rgba(255,255,255,0.09);
      border: 1px solid rgba(249,241,8,0.22);
      border-radius: 12px;
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; /* 16px = no iOS zoom */
      line-height: 1.45; padding: 11px 15px;
      outline: none; resize: none;
      min-height: 46px; max-height: 140px;
      overflow-y: auto;
      transition: border-color 150ms;
      -webkit-appearance: none;
    }
    #chat-input::placeholder { color: rgba(240,234,255,0.35); }
    #chat-input:focus { border-color: rgba(249,241,8,0.55); }

    #chat-send {
      background: var(--gold); color: #1a0e2b;
      border: none; border-radius: 12px;
      width: 48px; height: 48px;
      font-size: 20px; font-weight: 700;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: filter 150ms, opacity 150ms;
    }
    #chat-send:hover { filter: brightness(1.1); }
    #chat-send:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Desktop intro sidebar hint ── */
    @media (min-width: 700px) {
      .msg { max-width: 72%; font-size: 15.5px; }
    }
  </style>
</head>

<body>
<div class="page-wrap">
  <div class="chat-panel">

    <!-- Header -->
    <header class="chat-header">
      <a href="/" class="back-btn">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="8 2 3 6.5 8 11"></polyline>
        </svg>
        Back
      </a>
      <div class="chat-header-identity">
        <img class="luis-avatar"
          src="https://donordrivecontent.com/wishamile/images/$avatars$/constituent_939DF099-9E15-71BA-827B5EF85610BE47.jpg"
          alt="Luis Vecchio — El Capitan"
          onerror="this.style.display='none'">
        <div>
          <div class="luis-name">El Capitan</div>
          <div class="luis-sub">Luis Vecchio · TGT Founder · WAM Veteran</div>
        </div>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages">
      <div class="msg msg-luis">Ahoy. I'm Luis — El Capitan of The Grateful Team. Real boat captain, real WAM rider, real TGT legend. Ask me anything about the ride, the team, or how to raise money for Make-A-Wish Michigan.</div>
    </div>

    <!-- Suggested starters -->
    <div id="starters">
      <button class="starter-chip" data-q="How long is the ride?">How long is the ride?</button>
      <button class="starter-chip" data-q="How do I join the team?">How do I join?</button>
      <button class="starter-chip" data-q="How do I fundraise?">How do I fundraise?</button>
      <button class="starter-chip" data-q="What should I bring to WAM?">What to bring?</button>
      <button class="starter-chip" data-q="Tell me about Zoo-de-Mack">Zoo-de-Mack?</button>
    </div>

    <!-- Input -->
    <div class="chat-input-bar">
      <textarea
        id="chat-input"
        placeholder="Ask El Capitan anything…"
        rows="1"
        maxlength="500"
        autocomplete="off"
        autocorrect="on"
        spellcheck="true"
      ></textarea>
      <button id="chat-send" aria-label="Send message">↑</button>
    </div>

  </div>
</div>

<script>
(function () {
  const WORKER_URL = 'https://ask-luis.jmaitner1.workers.dev';
  const messagesEl = document.getElementById('messages');
  const startersEl = document.getElementById('starters');
  const input      = document.getElementById('chat-input');
  const sendBtn    = document.getElementById('chat-send');
  let startersHidden = false;

  /* Auto-grow textarea */
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function hideStarters() {
    if (!startersHidden) {
      startersEl.style.display = 'none';
      startersHidden = true;
    }
  }

  function addMsg(text, who) {
    hideStarters();
    const el = document.createElement('div');
    el.className = 'msg msg-' + who;
    el.textContent = text;
    messagesEl.appendChild(el);
    scrollBottom();
    return el;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg msg-typing';
    el.textContent = '• • •';
    messagesEl.appendChild(el);
    scrollBottom();
    return el;
  }

  async function askLuis(message) {
    sendBtn.disabled = true;
    const typing = showTyping();
    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      typing.remove();
      if (!res.ok) throw new Error();
      const data = await res.json();
      addMsg(data.reply || "Something went sideways. Try again.", 'luis');
    } catch {
      typing.remove();
      addMsg("Lost the signal — try again in a sec, captain's orders.", 'luis');
    } finally {
      sendBtn.disabled = false;
      input.focus();
      scrollBottom();
    }
  }

  function submit(message) {
    const msg = (message || input.value).trim();
    if (!msg || sendBtn.disabled) return;
    input.value = '';
    input.style.height = 'auto';
    addMsg(msg, 'user');
    askLuis(msg);
  }

  /* Suggested starters */
  startersEl.querySelectorAll('.starter-chip').forEach(chip => {
    chip.addEventListener('click', () => submit(chip.dataset.q));
  });

  sendBtn.addEventListener('click', () => submit());

  input.addEventListener('keydown', e => {
    /* Desktop Enter = send, Shift+Enter = newline. Mobile: always newline. */
    if (e.key === 'Enter' && !e.shiftKey && window.innerWidth >= 700) {
      e.preventDefault();
      submit();
    }
  });
})();
</script>
</body>
</html>
