name: Update Team Stats & Activity Feed

on:
  schedule:
    - cron: '0 14 * * *'   # Daily at 9am ET (14:00 UTC)
  workflow_dispatch:         # Allow manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: jackson-changes
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch DonorDrive data
        run: |
          echo "Fetching team..."
          curl -sf -H "Accept: application/json" \
            "https://makeawishmichigan.donordrive.com/api/teams/5450" \
            -o /tmp/team.json
          echo "Fetching donations..."
          curl -sf -H "Accept: application/json" \
            "https://makeawishmichigan.donordrive.com/api/teams/5450/donations?limit=20&orderBy=createdDateUTC&desc=true" \
            -o /tmp/donations.json
          echo "Fetching participants..."
          curl -sf -H "Accept: application/json" \
            "https://makeawishmichigan.donordrive.com/api/teams/5450/participants?limit=60&orderBy=displayName" \
            -o /tmp/participants.json
          echo "All fetches complete"

      - name: Process and write data files
        run: python3 scripts/update_stats.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/team-stats.json assets/data/activity-feed.json assets/data/participants.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update team stats and activity feed [skip ci]"
          git push origin HEAD:jackson-changes
