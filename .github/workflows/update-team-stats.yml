name: Update Team Stats & Activity Feed

# Data JSON commits land on `main` so Cloudflare Pages (production branch main) gets Strava + grit on every run.
# Cron uses the workflow revision on the repo DEFAULT branch — keep this file on `main`.

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours UTC — keeps repo JSON closer to DonorDrive between deploys
    - cron: '0 14 * * *'    # Daily at 9am ET (14:00 UTC)
  workflow_dispatch:

# Avoid overlapping writers trampling each other when cron + dispatch coincide.
concurrency:
  group: tgt-stats-main
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    # Runs always bump JSON updatedAt strings. Skip re-entry only when THIS push was our own bot commit
    # ([tgt-data-sync]); schedule/dispatch ignore push rules. Omit [skip ci] so hosts like Netlify still build.
    if: |-
      ${{ !(
          github.event_name == 'push' &&
          github.event.head_commit != null &&
          contains(github.event.head_commit.message, '[tgt-data-sync]')
        ) }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fetch DonorDrive data
        run: python3 scripts/fetch_donordrive.py

      - name: Refresh Strava token and fetch club data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          set -eo pipefail
          if [ -z "$STRAVA_CLIENT_ID" ] || [ -z "$STRAVA_CLIENT_SECRET" ] || [ -z "$STRAVA_REFRESH_TOKEN" ]; then
            echo '::warning::Strava OAuth secrets missing (STRAVA_CLIENT_ID / STRAVA_CLIENT_SECRET / STRAVA_REFRESH_TOKEN). Skipping Strava.'
            echo '[]' > /tmp/strava_activities.json
            echo '[]' > /tmp/strava_members.json
            echo '[]' > /tmp/strava_group_events.json
            exit 0
          fi

          TOK_JSON="$(curl -sf -X POST 'https://www.strava.com/api/v3/oauth/token' \
            -d "client_id=${STRAVA_CLIENT_ID}" \
            -d "client_secret=${STRAVA_CLIENT_SECRET}" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=${STRAVA_REFRESH_TOKEN}")" || true

          if [ -z "$TOK_JSON" ]; then
            echo '::warning::Strava token refresh failed (check client id/secret/refresh token). Skipping Strava.'
            echo '[]' > /tmp/strava_activities.json
            echo '[]' > /tmp/strava_members.json
            echo '[]' > /tmp/strava_group_events.json
            exit 0
          fi

          ACCESS_TOKEN="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["access_token"])' <<< "$TOK_JSON")"
          NEW_REFRESH="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read()).get("refresh_token",""))' <<< "$TOK_JSON")"
          if [ -n "$NEW_REFRESH" ] && [ "$NEW_REFRESH" != "$STRAVA_REFRESH_TOKEN" ]; then
            echo '::notice::Strava returned a NEW refresh_token. Update GitHub secret STRAVA_REFRESH_TOKEN to this value in Strava (My API Application) or from the token response — the old refresh token is now invalid.'
          fi

          echo "Fetching Strava club activities (multi-page)..."
          export STRAVA_ACCESS_TOKEN="${ACCESS_TOKEN}"
          python3 scripts/fetch_strava_club_activities_pages.py /tmp/strava_activities.json \
            || (echo '::warning::Multi-page club activities fetch failed; falling back empty.' && echo '[]' > /tmp/strava_activities.json)
          echo "Fetching Strava club members..."
          curl -sf -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://www.strava.com/api/v3/clubs/1302442/members?per_page=200&page=1" \
            -o /tmp/strava_members.json || echo '[]' > /tmp/strava_members.json
          echo "Fetching Strava club group events..."
          curl -sf -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            "https://www.strava.com/api/v3/clubs/1302442/group_events" \
            -o /tmp/strava_group_events.json || echo '[]' > /tmp/strava_group_events.json
          echo "Strava fetch complete"

      - name: Process and write data files
        env:
          # Widen grit window toward recent club activities (caps bar at /10 on site).
          STRAVA_GRIT_SEED_LOOKBACK_DAYS: '28'
          STRAVA_GRIT_DEFAULT_LOOKBACK_DAYS: '21'
        run: python3 scripts/update_stats.py

      - name: Commit and push
        env:
          BRANCH: main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/team-stats.json assets/data/activity-feed.json assets/data/participants.json assets/data/strava-rides.json assets/data/strava-members.json assets/data/strava-group-events.json assets/data/rider-stats.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(data): refresh DonorDrive + Strava JSON [tgt-data-sync]"
          git pull --rebase origin "${BRANCH}"
          git push origin "HEAD:${BRANCH}"
