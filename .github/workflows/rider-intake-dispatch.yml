name: Rider card intake (Form → Sheets → GitHub)

on:
  repository_dispatch:
    types: [rider-card-intake]

jobs:
  merge-intake-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RIDER_INTAKE_WEBHOOK_SECRET: ${{ secrets.RIDER_INTAKE_WEBHOOK_SECRET }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: jackson
          fetch-depth: 0

      - name: Validate secret configured
        run: |
          if [ -z "$RIDER_INTAKE_WEBHOOK_SECRET" ]; then
            echo "::error::Add repo secret RIDER_INTAKE_WEBHOOK_SECRET — Google Apps Script sends the same value in client_payload.secret"
            exit 1
          fi

      - name: Merge payload into rider-intake.json
        run: python3 scripts/merge_rider_intake.py

      - name: Commit
        env:
          BRANCH: jackson
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/rider-intake.json
          git diff --cached --quiet && echo "No changes (unexpected)" && exit 1
          git commit -m "feat(roster): add rider card from Google Form onboarding intake"
          git pull --rebase origin "${BRANCH}"
          git push origin "HEAD:${BRANCH}"
